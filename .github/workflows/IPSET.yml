name: Build IPSET Kernel Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: OnePlusOSS/android_kernel_oneplus_sm8475
          ref: oneplus/sm8475_b_16.0.0_ace_2
          path: kernel-source
          
      - name: Checkout
        run: |
          pwd
          ls
          ls /kernel-source/prebuilts-master/clang/host/linux-x86/clang-r416183b
      
      - name: Set Toolchain Path
        run: |
          CLANG_BIN="$GITHUB_WORKSPACE/kernel-source/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin"
          echo "$CLANG_BIN" >> $GITHUB_PATH
          echo "TOOLCHAIN_BIN=$CLANG_BIN" >> $GITHUB_ENV
     
      - name: Build Modules
        working-directory: kernel-source
        run: |
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          cd common 
          
          make O=out ARCH=arm64 gki_defconfig
          
          scripts/config --file out/.config -e CONFIG_MODULES
          scripts/config --file out/.config -m CONFIG_IP_SET
          scripts/config --file out/.config -m CONFIG_IP_SET_BITMAP_IP
          scripts/config --file out/.config -m CONFIG_IP_SET_BITMAP_IPMAC
          scripts/config --file out/.config -m CONFIG_IP_SET_BITMAP_PORT
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_IP
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_IPMAC
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_IPMARK
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_IPPORT
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_IPPORTIP
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_IPPORTNET
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_MAC
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_NET
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_NETPORT
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_NETNET
          scripts/config --file out/.config -m CONFIG_IP_SET_HASH_NETIFACE
          scripts/config --file out/.config -m CONFIG_IP_SET_LIST_SET
          scripts/config --file out/.config -m CONFIG_NETFILTER_XT_SET

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 modules_prepare

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 M=net/netfilter/ipset modules
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 M=net/netfilter xt_set.ko

      - name: Collect and Upload
        run: |
          mkdir -p final_output
          find kernel-source/common/out/ -name "*.ko" -exec cp {} final_output/ \;
          
          cat <<EOF > final_output/load.sh
          #!/system/bin/sh
          DIR="\$(dirname \$(readlink -f \$0))"
          insmod \$DIR/ip_set.ko
          for f in \$DIR/ip_set_hash_*.ko; do insmod \$f; done
          insmod \$DIR/xt_set.ko
          lsmod | grep ip_set
          EOF
          chmod +x final_output/load.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPSET-KO
          path: final_output/*
