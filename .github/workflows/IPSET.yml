name: Build IPSET Kernel Modules

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libncurses-dev libssl-dev bc flex bison libelf-dev tree dos2unix ccache python3 git curl liblz4-tool zlib1g-dev libxml2-utils rsync unzip gawk cpio lz4 lzop pahole dwarves coreutils procps

      - name: Configure Git and repo
        run: |
          git config --global user.email "bot@kernelsu.org"
          git config --global user.name "KernelSUBot"
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8475 -m oneplus_ace2_b.xml --repo-rev=stable --depth=1 --no-clone-bundle --no-tags
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync

          for dir in kernel_platform/common kernel_platform/msm-kernel; do
            rm -f "$dir/android/abi_gki_protected_exports_"* 2>/dev/null || true
          done
      
      - name: Set Toolchain Path
        run: |
          CLANG_BIN="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin"
          echo "$CLANG_BIN" >> $GITHUB_PATH
          echo "TOOLCHAIN_BIN=$CLANG_BIN" >> $GITHUB_ENV
     
      - name: Build Modules
        working-directory: kernel_workspace/kernel_platform
        run: |
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          cd common 
          
          make O=out ARCH=arm64 gki_defconfig
          
          scripts/config --file out/.config -e CONFIG_MODULES
          
          # 核心支撑
          scripts/config --file out/.config -m CONFIG_NETFILTER_NETLINK
          scripts/config --file out/.config -m CONFIG_NETFILTER_NETLINK_GLUE_TABLE
          
          # IPSET 核心及算法
          scripts/config --file out/.config -m CONFIG_IP_SET
          scripts/config --file out/.config --set-val CONFIG_IP_SET_MAX 65534
          for type in BITMAP_IP BITMAP_IPMAC BITMAP_PORT HASH_IP HASH_IPMARK HASH_IPPORT \
                       HASH_IPPORTIP HASH_IPPORTNET HASH_IPMAC HASH_MAC HASH_NET \
                       HASH_NETNET HASH_NETPORT HASH_NETIFACE LIST_SET; do
            scripts/config --file out/.config -m CONFIG_IP_SET_$type
          done
          
          # Netfilter 扩展
          scripts/config --file out/.config -m CONFIG_NETFILTER_XT_SET
          scripts/config --file out/.config -m CONFIG_NETFILTER_XT_MATCH_ADDRTYPE
          
          # IPv6 NAT & Masquerade
          scripts/config --file out/.config -m CONFIG_IP6_NF_NAT
          scripts/config --file out/.config -m CONFIG_IP6_NF_TARGET_MASQUERADE
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 modules_prepare
          
      - name: Build All Modules
        working-directory: kernel-workspace/kernel_platform/common
        run: |
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 M=net/netfilter modules
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 M=net/ipv6/netfilter modules

      - name: Collect and Upload
        run: |
          mkdir -p final_output
          find kernel_workspace/kernel_platform/common/out/ -name "*.ko" -exec cp {} final_output/ \;
          
          cat <<EOF > final_output/load.sh
          #!/system/bin/sh
          DIR="\$(dirname \$(readlink -f \$0))"
          insmod \$DIR/ip_set.ko
          for f in \$DIR/ip_set_hash_*.ko; do insmod \$f; done
          insmod \$DIR/xt_set.ko
          lsmod | grep ip_set
          EOF
          chmod +x final_output/load.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPSET-KO
          path: final_output/*
